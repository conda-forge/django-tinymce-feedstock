{% set name = "django-tinymce" %}
{% set version = "5.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 6257669ed596accf5fa967ff3061276b2c5352baac1bbc658fcd8252b12ca38a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - django >=4.2

test:
  imports:
    - tinymce
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A Django application that contains a widget to render a form field as a TinyMCE editor
  home: https://github.com/jazzband/django-tinymce
  license: MIT
  license_file:
    - LICENSE.txt
    - tinymce/static/tinymce/license.txt

extra:
  recipe-maintainers:
    - mxr-conda
    - rxm7706
