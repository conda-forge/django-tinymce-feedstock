# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.0.0"

package:
  name: django-tinymce
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tinymce/django_tinymce-${{ version }}.tar.gz
  sha256: 6257669ed596accf5fa967ff3061276b2c5352baac1bbc658fcd8252b12ca38a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports: tinymce
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/jazzband/django-tinymce
  license: MIT AND GPL-2.0-or-later
  license_file: LICENSE
  summary: A Django application that contains a widget to render a
  description: |
    A Django application that contains a widget to render a
  documentation: https://django-tinymce.readthedocs.org/

extra:
  recipe-maintainers:
    - rxm7706
